<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase McDlilan</title>
    <!-- Importing San Francisco-like fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Apple-style Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Hero Container */
        .hero {
            text-align: center;
            padding: 20px;
        }

        /* Super big caps "HI" */
        .greeting {
            font-size: clamp(5rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: fadeInUp 1s ease-out;
        }

        /* Apple-style subtitle */
        .subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            color: #86868b;
            animation: fadeInUp 1.2s ease-out backwards;
        }

        /* Highlighting your name */
        .name {
            color: #f5f5f7;
            font-weight: 700;
        }

        /* Subtle smooth animation on load */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main class="hero">
        <h1 class="greeting">HI</h1>
        <p class="subtitle">My name is <span class="name">Chase McDlilan</span></p>
    </main>

</body>
</html>
