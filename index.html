<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clevis Corporation Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000; --bg-secondary: #161617; --text-primary: #ffffff;
            --text-secondary: #86868b; --accent-orange: #ff7b00; --border-color: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; height: 48px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 9999; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-container { max-width: 1024px; margin: 0 auto; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 22px; }
        .nav-logo { font-weight: 500; font-size: 14px; cursor: pointer; color: var(--text-primary); }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-item { font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 15px 0; }
        .nav-item:hover { color: var(--text-primary); }
        
        main { margin-top: 48px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .home-welcome-hero { height: calc(100vh - 48px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .apple-buy-container { max-width: 1100px; margin: 0 auto; padding: 60px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        .apple-media-sticky { position: sticky; top: 88px; background: #111112; border-radius: 22px; padding: 40px; min-height: 500px; display: flex; align-items: center; justify-content: center; }
        .apple-device-frame { position: relative; width: 380px; height: 380px; }
        .apple-device-frame img { position: absolute; max-width: 100%; opacity: 0; transition: opacity 0.4s ease; }
        .apple-device-frame img.active { opacity: 1; }
        
        .apple-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .apple-dot.selected { border-color: #ffffff; transform: scale(1.1); }
        
        .action-submit-btn { width: 100%; padding: 16px; background: #ffffff; color: #000000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .job-card { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="nav-logo" onclick="location.reload()">Clevis Corporation</div>
            <ul class="nav-links">
                <li class="nav-item" onclick="switchToPanel('home')">Hardware</li>
                <li class="nav-item" onclick="switchToPanel('careers')">Careers</li>
            </ul>
        </div>
    </header>

    <main>
        <div id="panel-home" class="view-section active">
            <section class="home-welcome-hero"><h1>Clevis Ecosystem</h1></section>
            <div style="max-width:800px; margin:0 auto; padding:40px;">
                <div class="job-card" onclick="openConfigurator('clevisphone')"><h3>ClevisPhone Elite 4</h3><p>Configure Now</p></div>
            </div>
        </div>

        <div id="panel-buy" class="view-section">
            <div id="discovery-sub-view" style="max-width:800px; margin:0 auto; padding:60px 22px;">
                <h1 id="disc-brand-title"></h1>
                <div id="disc-model-list" style="margin-top:30px;"></div>
            </div>
            
            <div id="apple-purchase-view" class="apple-buy-container" style="display:none;">
                <div class="apple-media-sticky">
                    <div class="apple-device-frame" id="apple-frame-layer"></div>
                </div>
                <div>
                    <h2 id="cfg-title"></h2>
                    <div id="apple-swatch-container" style="display:flex; gap:15px; margin:20px 0;"></div>
                    <button class="action-submit-btn" onclick="alert('Queued')">Purchase</button>
                    <p style="margin-top:20px; cursor:pointer;" onclick="switchToPanel('home')">&lt; Back</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const db = {
            clevisphone: { title: "ClevisPhone Series", models: [
                { name: "ClevisPhone Elite 4", price: 1199, finishes: [
                    { name: "Space Graphite", hex: "#2c2d30", img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&q=80&w=600" },
                    { name: "Satin Gold", hex: "#e3c79a", img: "https://images.unsplash.com/photo-1573148195900-7845dcb9b127?auto=format&fit=crop&q=80&w=600" }
                ]}
            ]}
        };

        function switchToPanel(id) {
            document.querySelectorAll('.view-section').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${id}`).classList.add('active');
        }

        function openConfigurator(key) {
            switchToPanel('buy');
            document.getElementById('discovery-sub-view').style.display = 'block';
            document.getElementById('apple-purchase-view').style.display = 'none';
            const data = db[key];
            document.getElementById('disc-brand-title').innerText = data.title;
            const list = document.getElementById('disc-model-list');
            list.innerHTML = '';
            data.models.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'job-card';
                div.innerHTML = `<h4>${m.name}</h4>`;
                div.onclick = () => launchPurchase(m);
                list.appendChild(div);
            });
        }

        function launchPurchase(model) {
            document.getElementById('discovery-sub-view').style.display = 'none';
            document.getElementById('apple-purchase-view').style.display = 'grid';
            document.getElementById('cfg-title').innerText = model.name;
            
            const frame = document.getElementById('apple-frame-layer');
            const swatches = document.getElementById('apple-swatch-container');
            frame.innerHTML = '';
            swatches.innerHTML = '';
            
            model.finishes.forEach((fin, idx) => {
                const img = document.createElement('img');
                img.src = fin.img;
                if(idx === 0) img.classList.add('active');
                frame.appendChild(img);
                
                const dot = document.createElement('div');
                dot.className = `apple-dot ${idx === 0 ? 'selected' : ''}`;
                dot.style.backgroundColor = fin.hex;
                dot.onclick = () => {
                    document.querySelectorAll('.apple-dot').forEach(d => d.classList.remove('selected'));
                    dot.classList.add('selected');
                    frame.querySelectorAll('img').forEach((i, iIdx) => i.classList.toggle('active', iIdx === idx));
                };
                swatches.appendChild(dot);
            });
        }
    </script>
</body>
</html>
