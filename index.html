<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clevis Corporation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #86868b;
            --accent-orange: #ff7b00;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-stack);
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* TOP LEFT CORNER NAVIGATION LOGO */
        .brand-header {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
        }

        .wheat-logo {
            width: 16px;
            height: 16px;
            fill: var(--accent-orange);
        }

        .brand-name {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* GLOBAL NAV OVERLAY IN BOTTOM CORNER FOR ACCESSING THE ECOSYSTEM */
        .portal-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 32px;
        }

        .portal-link {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .portal-link:hover {
            color: var(--text-primary);
        }

        /* HERO MATRIX CONTAINER */
        .welcome-viewport {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            user-select: none;
        }

        .main-heading {
            font-size: 120px;
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 16px;
        }

        .sub-heading {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .credit-heading {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <header class="brand-header">
        <a href="index.html" class="logo-link">
            <svg class="wheat-logo" viewBox="0 0 24 24">
                <path d="M12,2C11.45,2 11,2.45 11,3C11,3.55 11.45,4 12,4C12.55,4 13,3.55 13,3C13,2.45 12.55,2 12,2M12,6C11.45,6 11,6.45 11,7C11,7.55 11.45,8 12,8C12.55,8 13,7.55 13,7C13,6.45 12.55,6 12,6M12,10C11.45,10 11,10.45 11,11C11,11.55 11.45,12 12,12C12.55,12 13,11.55 13,11C13,10.45 12.55,10 12,10M12,14C11.45,14 11,14.45 11,15C11,15.55 11.45,16 12,16C12.55,16 13,15.55 13,15C13,14.45 12.55,14 12,14M12,18C11.45,18 11,18.45 11,19C11,19.55 11.45,20 12,20C12.55,20 13,19.55 13,19C13,18.45 12.55,18 12,18Z"/>
            </svg>
            <span class="brand-name">Clevis</span>
        </a>
    </header>

    <main class="welcome-viewport">
        <h1 class="main-heading">HI</h1>
        <h2 class="sub-heading">Welcome to the Clevis Ecosystem</h2>
        <h3 class="credit-heading">by Chase McDillan</h3>
    </main>

    <nav class="portal-nav">
        <a href="hardware.html" class="portal-link">Hardware</a>
        <a href="games.html" class="portal-link">Games</a>
        <a href="careers.html" class="portal-link">Careers</a>
        <a href="legal.html" class="portal-link">Legal</a>
    </nav>

</body>
</html>
