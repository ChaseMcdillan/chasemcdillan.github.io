<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase McDlilan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Global Apple Aesthetic resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
        }

        /* Global Typography & Links */
        a {
            text-decoration: none;
            color: #2997ff;
            font-weight: 400;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Fake Apple Global Nav Bar */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(22, 22, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            width: 100%;
            max-width: 1024px;
            padding: 0 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 400;
            color: #cccccc;
            letter-spacing: -0.01em;
        }

        .nav-logo {
            font-weight: 700;
            color: #fff;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links span:hover {
            color: #fff;
        }

        /* Full-screen section base styling */
        .section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 120px;
            text-align: center;
            overflow: hidden;
        }

        /* Product text styling */
        .tagline {
            font-size: 14px;
            font-weight: 600;
            color: #f5f5f7;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .product-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .product-sub {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 400;
            letter-spacing: -0.01em;
            color: #86868b;
            margin-bottom: 18px;
        }

        .cta-links {
            font-size: clamp(1rem, 2vw, 1.3rem);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        /* Simulated product graphics */
        .product-visual {
            position: absolute;
            bottom: 0;
            width: 80%;
            max-width: 800px;
            height: 45vh;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
        }

        /* --- INDIVIDUAL SECTIONS --- */

        /* 1. Hero / Intro Section */
        .section-hero {
            background-color: #000000;
            justify-content: center;
            padding-top: 0;
        }

        .greeting {
            font-size: clamp(5rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        /* 2. MacBook Leo (White Section variant) */
        .section-macbook {
            background-color: #fbfbfd;
            color: #1d1d1f;
        }
        .section-macbook .product-title { color: #1d1d1f; }
        .section-macbook .tagline { color: #bf4800; }
        .section-macbook .visual-leo {
            /* Minimalist geometric wireframe resembling a thin open laptop */
            border-top: 6px solid #d2d2d7;
            border-left: 6px solid #d2d2d7;
            border-right: 6px solid #d2d2d7;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(180deg, #e8e8ed 0%, #ffffff 100%);
            box-shadow: 0px -20px 40px rgba(0,0,0,0.05);
        }

        /* 3. liePhone 67 */
        .section-iphone {
            background-color: #000000;
        }
        .section-iphone .product-title {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .section-iphone .visual-phone {
            /* Sleek pill-shaped container sitting dynamically at the bottom */
            border: 4px solid #222;
            border-bottom: none;
            border-radius: 40px 40px 0 0;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            width: 45%;
            max-width: 380px;
            height: 50vh;
        }
        .section-iphone .visual-phone::before {
            /* Dynamic Island mimic */
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
        }

        /* 4. dahPods */
        .section-pods {
            background-color: #000000;
            background: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
        }
        .section-pods .visual-pods {
            /* Floating design elements */
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 60%;
            max-width: 500px;
            height: 40vh;
            border-radius: 30px 30px 0 0;
        }
    </style>
</head>
<body>

    <!-- Apple-style Navigation Bar -->
    <nav class="nav-bar">
        <div class="nav-content">
            <span class="nav-logo">CM</span>
            <div class="nav-links">
                <span onclick="document.getElementById('leo').scrollIntoView();">MacBook Leo</span>
                <span onclick="document.getElementById('liephone').scrollIntoView();">liePhone 67</span>
                <span onclick="document.getElementById('dahpods').scrollIntoView();">dahPods</span>
            </div>
        </div>
    </nav>

    <!-- Welcome Hero Section -->
    <section class="section section-hero">
        <h1 class="greeting">HI</h1>
        <p class="product-sub">My name is <span style="color: #fff; font-weight: 600;">Chase McDlilan</span></p>
    </section>

    <!-- MacBook Leo Showcase (Clean White Apple Aesthetic) -->
    <section id="leo" class="section section-macbook">
        <p class="tagline">New</p>
        <h2 class="product-title">MacBook Leo</h2>
        <p class="product-sub">Mind-blowing performance. Strikingly thin.</p>
        <div class="cta-links">
            <a href="#">Learn more &gt;</a>
            <a href="#">Buy &gt;</a>
        </div>
        <div class="product-visual visual-leo"></div>
    </section>

    <!-- liePhone 67 Showcase (Sleek Pro Dark Aesthetic) -->
    <section id="liephone" class="section section-iphone">
        <h2 class="product-title">liePhone 67 Pro</h2>
        <p class="product-sub">Titanium. So strong. So light. So elite.</p>
        <div class="cta-links">
            <a href="#">Learn more &gt;</a>
            <a href="#">Buy &gt;</a>
        </div>
        <div class="product-visual visual-phone"></div>
    </section>

    <!-- dahPods Showcase (Audio/Atmospheric Aesthetic) -->
    <section id="dahpods" class="section section-pods">
        <h2 class="product-title">dahPods Max</h2>
        <p class="product-sub">Sound standard, completely reimagined.</p>
        <div class="cta-links">
            <a href="#">Learn more &gt;</a>
            <a href="#">Buy &gt;</a>
        </div>
        <div class="product-visual visual-pods"></div>
    </section>

</body>
</html>
