<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clevis Electronics | Premium Reimagined</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --accent-color: #0071e3;
            --card-bg: #1d1d1f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        header {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .nav-container {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
        }

        .logo {
            font-weight: 600;
            font-size: 21px;
            letter-spacing: -0.5px;
        }

        .hero {
            text-align: center;
            padding: 140px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 24px;
            color: #86868b;
            font-weight: 400;
        }

        .product-grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s;
            opacity: 0;
            transform: translateY(40px);
        }

        .product-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .image-container {
            width: 100%;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
        }

        .product-card img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tagline {
            color: #86868b;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .description {
            color: #a1a1a6;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .specs-list {
            width: 100%;
            text-align: left;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .specs-list li {
            list-style: none;
            font-size: 14px;
            color: #d2d2d7;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .specs-list li:last-child {
            border-bottom: none;
        }

        .specs-list strong {
            color: #fff;
        }

        .cta-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.2s;
        }

        .cta-btn:hover {
            background-color: #0077ed;
        }

        .cta-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .hero p { font-size: 20px; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Clevis</div>
        </div>
    </header>

    <section class="hero">
        <h1>The Next Generation is Here.</h1>
        <p>Engineered for excellence. Rebranded for you.</p>
    </section>

    <main class="product-grid" id="product-container"></main>

    <script>
        // Array containing verified real-world equivalent product images
        const products = [
            {
                name: "ClevisPhone",
                tagline: "Titanium Strength",
                image: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=800&auto=format&fit=crop&q=80",
                description: "Forged in aerospace-grade titanium with an advanced computational camera system.",
                specs: [
                    "Display: 6.7-inch Super Retina XDR OLED",
                    "Processor: Clevis A1 Silicon architecture",
                    "Camera: 48MP main sensor with 5x optical zoom",
                    "Battery Life: Up to 29 hours of video playback"
                ]
            },
            {
                name: "ClevisBook",
                tagline: "Mind-blowing Performance",
                image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=800&auto=format&fit=crop&q=80",
                description: "Unprecedented hardware efficiency packed into an impossibly thin aluminum enclosure.",
                specs: [
                    "Processor: Next-gen Clevis M system-on-chip",
                    "Display: Liquid Retina display with ProMotion",
                    "Battery Life: Up to 22 hours of professional use",
                    "Thermals: Silent, fanless baseline configurations"
                ]
            },
            {
                name: "Clevis Ice Cream Machine",
                tagline: "Commercial Grade Precision",
                image: "https://upload.wikimedia.org/wikipedia/commons/e/e4/Soft_serve_ice_cream_dispenser.jpg",
                description: "Industrial strength soft-serve engine optimized for seamless home integration.",
                specs: [
                    "Mechanism: Taylor-powered gravity feed system",
                    "Capacity: Dual freezing cylinders for fast production",
                    "Interface: Smart touch control with temperature regulation",
                    "Maintenance: Built-in heat treat cleaning cycle"
                ]
            }
        ];

        function renderProducts() {
            const container = document.getElementById('product-container');
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                let specsHTML = '<ul class="specs-list">';
                product.specs.forEach(spec => {
                    const parts = spec.split(':');
                    if(parts.length > 1) {
                        specsHTML += `<li><strong>${parts[0]}:</strong>${parts[1]}</li>`;
                    } else {
                        specsHTML += `<li>${spec}</li>`;
                    }
                });
                specsHTML += '</ul>';

                card.innerHTML = `
                    <div class="tagline">${product.tagline}</div>
                    <h2>${product.name}</h2>
                    <div class="image-container">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <p class="description">${product.description}</p>
                    ${specsHTML}
                    <button class="cta-btn">Learn more</button>
                `;
                
                container.appendChild(card);
            });
        }

        // Initialize display and setup viewport entry animation triggers
        renderProducts();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.product-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
