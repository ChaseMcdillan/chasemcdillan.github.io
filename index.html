<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clevis Corporation | Unified Ecosystem</title>
    <style>
        :root { --bg: #000; --text: #fff; --sub: #86868b; --accent: #ff7b00; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Navigation */
        nav { position: fixed; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 15px 40px; display: flex; gap: 30px; z-index: 1000; }
        .nav-link { cursor: pointer; color: var(--sub); font-size: 13px; }
        .nav-link:hover { color: var(--text); }

        /* General Sections */
        .section { min-height: 100vh; padding: 100px 40px; display: none; }
        .section.active { display: block; }
        h1 { font-size: 64px; }

        /* Purchase Page Specifics */
        .buy-container { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; max-width: 1100px; margin: 0 auto; }
        .device-preview { height: 500px; background: #111; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .device-img { position: absolute; max-width: 80%; opacity: 0; transition: opacity 0.3s; }
        .device-img.active { opacity: 1; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: #fff; }
    </style>
</head>
<body>

<nav>
    <div class="nav-link" onclick="show('home')">Home</div>
    <div class="nav-link" onclick="show('buy')">Store</div>
    <div class="nav-link" onclick="show('profile')">Profile</div>
    <div class="nav-link" onclick="show('legal')">Legal</div>
</nav>

<div id="home" class="section active">
    <h1>Welcome to Clevis.</h1>
    <p>The total integrated hardware and software environment.</p>
</div>

<div id="buy" class="section">
    <h1>Purchase.</h1>
    <div class="buy-container">
        <div class="device-preview" id="preview">
            <!-- Simulated Hardware Assets -->
            <img src="https://via.placeholder.com/300x500/333/fff?text=Graphite+Device" class="device-img active" id="img-0">
            <img src="https://via.placeholder.com/300x500/aaa/000?text=Silver+Device" class="device-img" id="img-1">
        </div>
        <div>
            <h3>Pick your colour.</h3>
            <div style="display:flex; gap:10px; margin-bottom:40px;">
                <div class="swatch active" style="background:#333;" onclick="switchColor(0, this)"></div>
                <div class="swatch" style="background:#aaa;" onclick="switchColor(1, this)"></div>
            </div>
            <button onclick="alert('Added to cart')">Add to Bag</button>
        </div>
    </div>
</div>

<div id="profile" class="section">
    <h1>Caleb Leung.</h1>
    <p>Design Architect & Lead Technologist.</p>
</div>

<div id="legal" class="section">
    <h1>Legal.</h1>
    <p>Terms of service and ecosystem compliance policies.</p>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function switchColor(idx, el) {
        document.querySelectorAll('.device-img').forEach(img => img.classList.remove('active'));
        document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
        document.getElementById('img-' + idx).classList.add('active');
        el.classList.add('active');
    }
</script>

</body>
</html>
